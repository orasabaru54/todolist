<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 20px;
      padding-top: 8px;
    }

    /* 追加フォーム */
    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .add-form input {
      flex: 1;
      padding: 12px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus {
      border-color: #6c63ff;
    }

    .add-form button {
      padding: 12px 18px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .add-form button:hover { background: #5a52d5; }

    /* フィルター */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-bar button {
      flex: 1;
      padding: 8px 4px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-bar button.active {
      background: #6c63ff;
      color: #fff;
      border-color: #6c63ff;
    }

    /* タスクリスト */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px 14px 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: opacity 0.2s;
    }

    .task-card.done { opacity: 0.5; }

    .task-name {
      flex: 1;
      font-size: 15px;
      color: #1a1a2e;
      word-break: break-all;
    }

    .task-card.done .task-name {
      text-decoration: line-through;
      color: #999;
    }

    /* ステータスバッジ */
    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .status-badge.todo   { background: #ffe9e9; color: #e55; }
    .status-badge.doing  { background: #fff3cd; color: #b07d00; }
    .status-badge.done   { background: #e6f4ea; color: #2a7a3b; }

    /* アクションボタン */
    .actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-status, .btn-delete {
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-status { background: #eef; }
    .btn-status:hover { background: #ddf; }
    .btn-delete { background: #fee; }
    .btn-delete:hover { background: #fcc; }

    /* 空状態 */
    .empty {
      text-align: center;
      color: #aaa;
      margin-top: 48px;
      font-size: 15px;
    }

    .empty span { font-size: 40px; display: block; margin-bottom: 10px; }

    /* 件数 */
    .summary {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📋 Todo</h1>

  <form class="add-form" id="addForm">
    <input type="text" id="taskInput" placeholder="新しいタスクを入力…" maxlength="100">
    <button type="submit">＋</button>
  </form>

  <div class="filter-bar">
    <button class="active" data-filter="all">すべて</button>
    <button data-filter="todo">未着手</button>
    <button data-filter="doing">着手中</button>
    <button data-filter="done">完了</button>
  </div>

  <div class="summary" id="summary"></div>
  <div class="task-list" id="taskList"></div>
</div>

<script>
  const STATUS = {
    todo:  { label: '未着手', cls: 'todo',  next: 'doing' },
    doing: { label: '着手中', cls: 'doing', next: 'done'  },
    done:  { label: '完了',   cls: 'done',  next: 'todo'  },
  };

  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let filter = 'all';

  function save() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function addTask(name) {
    tasks.unshift({ id: Date.now(), name, status: 'todo' });
    save();
    render();
  }

  function nextStatus(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.status = STATUS[t.status].next; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function render() {
    const visible = filter === 'all' ? tasks : tasks.filter(t => t.status === filter);

    const list = document.getElementById('taskList');
    const summary = document.getElementById('summary');

    const counts = { todo: 0, doing: 0, done: 0 };
    tasks.forEach(t => counts[t.status]++);
    summary.textContent = `未着手 ${counts.todo} / 着手中 ${counts.doing} / 完了 ${counts.done}`;

    if (visible.length === 0) {
      list.innerHTML = `<div class="empty"><span>🎉</span>タスクはありません</div>`;
      return;
    }

    list.innerHTML = visible.map(t => {
      const s = STATUS[t.status];
      return `
        <div class="task-card ${t.status === 'done' ? 'done' : ''}">
          <span class="task-name">${escHtml(t.name)}</span>
          <span class="status-badge ${s.cls}">${s.label}</span>
          <div class="actions">
            <button class="btn-status" onclick="nextStatus(${t.id})" title="次のステータスへ">▶</button>
            <button class="btn-delete" onclick="deleteTask(${t.id})" title="削除">🗑</button>
          </div>
        </div>`;
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('addForm').addEventListener('submit', e => {
    e.preventDefault();
    const input = document.getElementById('taskInput');
    const name = input.value.trim();
    if (!name) return;
    addTask(name);
    input.value = '';
    input.focus();
  });

  document.querySelector('.filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('button[data-filter]');
    if (!btn) return;
    filter = btn.dataset.filter;
    document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });

  render();
</script>
</body>
</html>
