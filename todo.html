<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 20px;
      padding-top: 8px;
    }

    /* 追加フォーム */
    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .add-form input {
      flex: 1;
      padding: 12px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus { border-color: #6c63ff; }

    .add-form button {
      padding: 12px 18px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .add-form button:hover { background: #5a52d5; }

    /* CSVインポートエリア */
    .csv-area {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .btn-csv {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 14px;
      background: #fff;
      border: 1.5px dashed #aab;
      border-radius: 10px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-csv:hover { border-color: #6c63ff; color: #6c63ff; background: #f5f4ff; }

    .btn-sample {
      font-size: 12px;
      color: #999;
      text-decoration: underline;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .btn-sample:hover { color: #6c63ff; }

    #csvInput { display: none; }

    /* ドラッグ&ドロップ強調 */
    .csv-area.dragover .btn-csv {
      border-color: #6c63ff;
      background: #f0efff;
      color: #6c63ff;
    }

    /* トースト通知 */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e;
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error { background: #c0392b; }

    /* フィルター */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-bar button {
      flex: 1;
      padding: 8px 4px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-bar button.active {
      background: #6c63ff;
      color: #fff;
      border-color: #6c63ff;
    }

    /* タスクリスト */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px 14px 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: opacity 0.2s;
    }

    .task-card.done { opacity: 0.5; }

    .task-name {
      flex: 1;
      font-size: 15px;
      color: #1a1a2e;
      word-break: break-all;
    }

    .task-card.done .task-name {
      text-decoration: line-through;
      color: #999;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .status-badge.todo  { background: #ffe9e9; color: #e55; }
    .status-badge.doing { background: #fff3cd; color: #b07d00; }
    .status-badge.done  { background: #e6f4ea; color: #2a7a3b; }

    .actions { display: flex; gap: 6px; flex-shrink: 0; }

    .btn-status, .btn-delete {
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-status { background: #eef; }
    .btn-status:hover { background: #ddf; }
    .btn-delete { background: #fee; }
    .btn-delete:hover { background: #fcc; }

    .empty {
      text-align: center;
      color: #aaa;
      margin-top: 48px;
      font-size: 15px;
    }

    .empty span { font-size: 40px; display: block; margin-bottom: 10px; }

    .summary { font-size: 12px; color: #999; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="container">
  <h1>📋 Todo</h1>

  <form class="add-form" id="addForm">
    <input type="text" id="taskInput" placeholder="新しいタスクを入力…" maxlength="100">
    <button type="submit">＋</button>
  </form>

  <!-- CSVインポート -->
  <div class="csv-area" id="csvArea">
    <label class="btn-csv" for="csvInput">
      📂 CSVインポート
    </label>
    <input type="file" id="csvInput" accept=".csv,text/csv">
    <button class="btn-sample" id="btnSample">サンプルDL</button>
  </div>

  <div class="filter-bar">
    <button class="active" data-filter="all">すべて</button>
    <button data-filter="todo">未着手</button>
    <button data-filter="doing">着手中</button>
    <button data-filter="done">完了</button>
  </div>

  <div class="summary" id="summary"></div>
  <div class="task-list" id="taskList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STATUS = {
    todo:  { label: '未着手', cls: 'todo',  next: 'doing' },
    doing: { label: '着手中', cls: 'doing', next: 'done'  },
    done:  { label: '完了',   cls: 'done',  next: 'todo'  },
  };

  const STATUS_ALIASES = {
    '未着手': 'todo', 'todo': 'todo',
    '着手中': 'doing', 'doing': 'doing', '進行中': 'doing',
    '完了': 'done', 'done': 'done',
  };

  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let filter = 'all';

  function save() { localStorage.setItem('tasks', JSON.stringify(tasks)); }

  function addTask(name, status = 'todo') {
    tasks.unshift({ id: Date.now() + Math.random(), name, status });
    save();
    render();
  }

  function nextStatus(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.status = STATUS[t.status].next; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function render() {
    const visible = filter === 'all' ? tasks : tasks.filter(t => t.status === filter);
    const list = document.getElementById('taskList');
    const summary = document.getElementById('summary');

    const counts = { todo: 0, doing: 0, done: 0 };
    tasks.forEach(t => counts[t.status]++);
    summary.textContent = `未着手 ${counts.todo} / 着手中 ${counts.doing} / 完了 ${counts.done}`;

    if (visible.length === 0) {
      list.innerHTML = `<div class="empty"><span>🎉</span>タスクはありません</div>`;
      return;
    }

    list.innerHTML = visible.map(t => {
      const s = STATUS[t.status];
      return `
        <div class="task-card ${t.status === 'done' ? 'done' : ''}">
          <span class="task-name">${escHtml(t.name)}</span>
          <span class="status-badge ${s.cls}">${s.label}</span>
          <div class="actions">
            <button class="btn-status" onclick="nextStatus(${JSON.stringify(t.id)})" title="次のステータスへ">▶</button>
            <button class="btn-delete" onclick="deleteTask(${JSON.stringify(t.id)})" title="削除">🗑</button>
          </div>
        </div>`;
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ---- CSV インポート ----
  function parseCSV(text) {
    // BOM除去
    text = text.replace(/^﻿/, '');
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length === 0) return { imported: 0, skipped: 0 };

    // ヘッダー行かどうか判定（1行目にタスク名列がない or "タスク名"/"名前"等の文字を含む）
    let startIdx = 0;
    const firstCells = parseLine(lines[0]);
    const headerKeywords = ['タスク名', '名前', 'name', 'task', 'タスク'];
    if (firstCells.length > 0 && headerKeywords.some(k => firstCells[0].toLowerCase().includes(k.toLowerCase()))) {
      startIdx = 1;
    }

    let imported = 0, skipped = 0;
    const newTasks = [];

    for (let i = startIdx; i < lines.length; i++) {
      const cols = parseLine(lines[i]);
      const name = cols[0] ? cols[0].trim() : '';
      if (!name) { skipped++; continue; }

      const rawStatus = cols[1] ? cols[1].trim() : '';
      const status = STATUS_ALIASES[rawStatus] || 'todo';

      newTasks.push({ id: Date.now() + i + Math.random(), name, status });
      imported++;
    }

    // 既存タスクの先頭に追加
    tasks = [...newTasks, ...tasks];
    save();
    render();
    return { imported, skipped };
  }

  function parseLine(line) {
    // ダブルクォート対応の簡易CSVパーサー
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else { inQ = !inQ; }
      } else if (c === ',' && !inQ) {
        cols.push(cur); cur = '';
      } else {
        cur += c;
      }
    }
    cols.push(cur);
    return cols;
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  function handleFile(file) {
    if (!file) return;
    if (!file.name.match(/\.csv$/i) && file.type !== 'text/csv') {
      showToast('CSVファイルを選択してください', true); return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      const { imported, skipped } = parseCSV(e.target.result);
      if (imported === 0) {
        showToast('インポートできるタスクがありませんでした', true);
      } else {
        showToast(`✓ ${imported}件インポート完了${skipped ? `（${skipped}件スキップ）` : ''}`);
      }
    };
    reader.readAsText(file, 'UTF-8');
  }

  // ファイル選択
  document.getElementById('csvInput').addEventListener('change', e => {
    handleFile(e.target.files[0]);
    e.target.value = '';
  });

  // ドラッグ&ドロップ
  const csvArea = document.getElementById('csvArea');
  csvArea.addEventListener('dragover', e => { e.preventDefault(); csvArea.classList.add('dragover'); });
  csvArea.addEventListener('dragleave', () => csvArea.classList.remove('dragover'));
  csvArea.addEventListener('drop', e => {
    e.preventDefault();
    csvArea.classList.remove('dragover');
    handleFile(e.dataTransfer.files[0]);
  });

  // サンプルCSVダウンロード
  document.getElementById('btnSample').addEventListener('click', () => {
    const content = '﻿タスク名,ステータス\n企画書作成,未着手\nミーティング準備,着手中\n報告書提出,完了\n買い物リスト確認,\n';
    const blob = new Blob([content], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'todo_sample.csv';
    a.click();
  });

  // ---- 既存機能 ----
  document.getElementById('addForm').addEventListener('submit', e => {
    e.preventDefault();
    const input = document.getElementById('taskInput');
    const name = input.value.trim();
    if (!name) return;
    addTask(name);
    input.value = '';
    input.focus();
  });

  document.querySelector('.filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('button[data-filter]');
    if (!btn) return;
    filter = btn.dataset.filter;
    document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });

  render();
</script>
</body>
</html>
